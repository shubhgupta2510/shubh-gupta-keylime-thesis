[agent]
ip = "0.0.0.0"
port = 9002

# Force HTTPS for registrar connection
registrar_ip = "mitm"
registrar_port = 8891

# Try multiple parameter variations for HTTPS
tls = true
tls_enabled = true
use_tls = true
registrar_tls = true  
registrar_tls_enabled = true
registrar_use_tls = true
secure = true
ssl = true

# Enable mTLS and trust attacker CA  
enable_agent_mtls = true
tls_dir = "/var/lib/keylime/cv_ca"
trusted_server_ca = ["/etc/attacker_certs/attacker_ca.crt"]

# Server certs for agent's own HTTPS server  
server_cert = "/var/lib/keylime/cv_ca/server-cert.crt"
server_key = "/var/lib/keylime/cv_ca/server-private.pem"

tpm_sign_alg = "rsassa"
tpm_hash_alg = "sha256"