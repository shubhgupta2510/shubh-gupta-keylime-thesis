[agent]
ip = "0.0.0.0"
port = 9002
registrar_ip = "mitm"           # Keep pointing to MITM
registrar_port = 8891           # Correct

# DD: Enable HTTPS for SSL MITM attack
registrar_tls_enabled = false

# Force RSASSA instead of RSAPSS for compatibility
tmp_sign_alg = "rsassa"
tpm_hash_alg = "sha256"

# Trust directory that includes attacker CA
tls_dir = "/var/lib/keylime/cv_ca"

# ADD: Explicitly trust attacker CA
# trusted_client_ca = ["/var/lib/keylime/cv_ca/attacker_ca.crt"]