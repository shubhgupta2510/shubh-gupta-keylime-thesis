[agent]
ip = "0.0.0.0"
port = 9002

# Point to MITM
registrar_ip = "mitm"
registrar_port = 8890

# Enable TLS from agent→MITM and trust the attacker CA
registrar_tls_enabled = true
tls_dir = "/var/lib/keylime/cv_ca"
trusted_server_ca = ["/etc/attacker_certs/attacker_ca.crt"]

tmp_sign_alg = "rsassa"
tpm_hash_alg = "sha256"