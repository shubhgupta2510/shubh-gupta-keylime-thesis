[tenant]

# The configuration file version number
version = 1

# The verifier IP address and port - updated to match Docker Compose network
verifier_ip = 0.0.0.0
verifier_port = 8892

# The registrar IP address and port - updated to match Docker Compose network
registrar_ip = 0.0.0.0
registrar_port = 8890

# Directory where TLS keys and certificates are stored - ensure path matches what's used in Docker
tls_dir = /var/lib/keylime/cv_ca

# Enable mTLS communication between agent, verifier, and tenant
enable_agent_mtls = True

# Keylime tenant client private key
client_key = client-private.pem

# Password for the private key (can be blank if not encrypted)
client_key_password = ""

# Keylime tenant client certificate
client_cert = client-cert.crt

# Trusted CA certificates
trusted_server_ca = ["/var/lib/keylime/cv_ca/cacert.crt", "/etc/attacker_certs/attacker_ca.crt"]

# Directory containing EK CA certificates
tpm_cert_store = /var/lib/keylime/tpm_certs

# Max payload size in bytes
max_payload_size = 4096

# List of accepted hash algorithms
accept_tpm_hash_algs = [sha256, sha384]

# List of accepted encryption algorithms
accept_tpm_encryption_algs = [rsa, ecc]

# List of accepted signature algorithms
accept_tpm_signing_algs = [rsassa, ecdsa]

# Enable exponential backoff for retries
exponential_backoff = True

# Retry interval or base for backoff (in seconds)
retry_interval = 1.5

# Max number of retries to communicate with TPM
max_retries = 5

# Request timeout in seconds
request_timeout = 60

# Require TPM EK certificate
require_ek_cert = True

# Optional script to verify EK (use only if require_ek_cert is False)
ek_check_script = 

# Path to measured boot reference state (optional)
mb_refstate = 

# Custom configs based on Docker Compose setup
[cloud_verifier]
ip = 0.0.0.0
port = 8892

[registrar]
ip = 0.0.0.0
port = 8891
tls_port = 8890

[ca]
cert_ca_name = Keylime CA
