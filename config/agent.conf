# Keylime agent configuration
[agent]

version = "1.0"

# Enable all supported API versions
api_versions = "default"

# Use the SHA256 hash of the Endorsement Key for the UUID
uuid = "hash_ek"

# Bind address and port - set to 0.0.0.0 to listen on all interfaces in Docker
ip = "0.0.0.0"
port = 9002

# Public-facing contact information - set this to the container hostname to be reachable
contact_ip = "keylime-agent"
contact_port = 9002

# Registrar location - use the Docker service name
registrar_ip = "keylime-registrar"
registrar_port = 8890

# Enable mTLS for secure communication
enable_agent_mtls = true

# Explicitly defined certificate paths to match Docker Compose volume mount
tls_dir = "/var/lib/keylime/cv_ca"
server_key = "/var/lib/keylime/cv_ca/server-private.pem"
server_key_password = ""
server_cert = "/var/lib/keylime/cv_ca/server-cert.crt"
trusted_client_ca = "/var/lib/keylime/cv_ca/cacert.crt"

# File names for encryption key and decrypted payload
enc_keyname = "encrypted_payload_key"
dec_payload_file = "decrypted_payload"

# Secure memory-backed tmpfs size
secure_size = "1M"

# TPM emulator configuration for Docker environment
tpm_ownerpassword = "keylime"

# TPM device path for the emulator - explicitly set for Docker
tpm_device_path = "/dev/tpmrm0"

# Automatically unzip payloads
extract_payload_zip = true

# Listen for verifier revocation notifications
enable_revocation_notifications = true
revocation_notification_ip = "0.0.0.0"
revocation_notification_port = 8992
revocation_cert = "/var/lib/keylime/cv_ca/cacert.crt"
revocation_actions = ""
payload_script = ""

# Increased retry settings for Docker environment
exponential_backoff = true
retry_interval = 2.0
max_retries = 10

# Allow insecure payloads only if mTLS is disabled (unsafe)
enable_insecure_payload = false

# Do not extend payload into PCR by default
measure_payload_pcr = -1

# TPM crypto algorithms
tpm_hash_alg = "sha256"
tpm_encryption_alg = "rsa"
tpm_signing_alg = "rsassa"

# Let Keylime create a new EK
ek_handle = "0x81000001"

# Disable IDevID/IAK for initial testing
enable_iak_idevid = false

# Run as root in Docker for initial setup (will be changed to keylime:tss when stable)
run_as = "root:root"

# Custom paths for IMA in Docker environment
ima_ml_path = "/sys/kernel/security/ima/ascii_runtime_measurements"
measuredboot_ml_path = "/sys/kernel/security/tpm0/binary_bios_measurements"

# Add tcti setting to match Docker Compose environment variable
tcti = "tabrmd:bus_type=system"

# Enable debugging for troubleshooting
debug_measurements = true
